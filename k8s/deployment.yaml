apiVersion: apps/v1
kind: Deployment
metadata:
  name: industrial-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: industrial-app
  template:
    metadata:
      labels:
        app: industrial-app
    spec:
      containers:
      - name: app
        image: mazidhossain/industrial-node-app:latest
        ports:
        - containerPort: 3000
          name: app          # ← PodMonitor-এর জন্য name লাগে